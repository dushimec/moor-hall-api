name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  # Test job
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: moorhall_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run linter
        run: npm run lint --if-present
        continue-on-error: true
      
      - name: Run type check
        run: npx tsc --noEmit
        continue-on-error: true
      
      - name: Run tests
        run: npm test --if-present
        continue-on-error: true
      
      - name: Build project
        run: npm run build
      
      - name: Check build output
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Build failed - dist directory not created"
            exit 1
          fi
          echo "✅ Build successful"
          ls -lh dist/

  # Security check job
  security:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: npm audit
        run: npm audit --production
        continue-on-error: true
      
      - name: Check for secrets
        run: |
          # Basic check for secrets in code
          ! grep -r "PRIVATE_KEY\|SECRET_KEY\|PASSWORD=" src/ --include="*.ts" || true
        continue-on-error: true

  # Deploy to Netlify (only on main branch)
  deploy:
    needs: [test, security]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build project
        run: npm run build
      
      - name: Deploy to Netlify
        uses: netlify/actions/cli@master
        with:
          args: deploy --prod --dir=dist
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      
      - name: Verify deployment
        run: |
          echo "✅ Deployment complete!"
          echo "View live site: https://${{ secrets.NETLIFY_SITE_ID }}.netlify.app"

  # Performance check (optional)
  performance:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build project
        run: npm run build
      
      - name: Check bundle size
        run: |
          SIZE=$(du -sh dist/ | cut -f1)
          echo "Build size: $SIZE"
          # Alert if larger than 50MB
          BYTES=$(du -sb dist/ | cut -f1)
          if [ $BYTES -gt 52428800 ]; then
            echo "⚠️ Warning: Build size larger than 50MB"
          else
            echo "✅ Build size acceptable"
          fi

# Configuration references:
# 
# Secrets to set in GitHub:
#   - NETLIFY_AUTH_TOKEN: Get from Netlify dashboard > User Settings > Applications > Personal access tokens
#   - NETLIFY_SITE_ID: Get from Netlify dashboard > Site Settings > General > Site ID
#
# Branches:
#   - main: Production deployments
#   - develop: Optional staging deployments
#
# Events:
#   - push: Triggered on commits
#   - pull_request: Triggered on PR creation/updates
